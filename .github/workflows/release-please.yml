name: Release
on:
  push:
    branches: [main]

# Least-privilege default for the workflow; each job opts into exactly the
# write scopes it needs and nothing more.
permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      # Full tag, e.g. v1.5.0 or v1.5.0-rc.1. Reconstructing it from
      # major.minor.patch drops any prerelease suffix.
      tag_name: ${{ steps.release.outputs.tag_name }}
      # Released commit. The git tag does not exist until the draft release is
      # published, so downstream jobs build from this SHA instead of the tag.
      sha: ${{ steps.release.outputs.sha }}
    steps:
      # release-please maintains a "release" PR with an updated CHANGELOG.md from
      # Conventional Commits. draft:true in the config means the release opens as
      # a draft so the jobs below can attach binaries; publish-release then flips
      # it live. GitHub freezes a release and its assets together at publish, so
      # assets cannot be added to an already-published (immutable) release.
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  release-binaries:
    name: Binary (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Attach assets to the GitHub Release release-please created.
      contents: write
      # Keyless Sigstore signing of the provenance, via the run's OIDC identity.
      id-token: write
      # Record the build-provenance attestation for each binary.
      attestations: write
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
    strategy:
      fail-fast: false
      matrix:
        # Same set of targets the upstream mkcert release shipped. linux/arm is
        # 32-bit ARMv6 (GOARM=6); everything else ignores GOARM.
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm, goarm: "6" }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - name: Check out the released commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Build the released commit by SHA: the git tag does not exist yet
          # while the release is still a draft.
          ref: ${{ needs.release-please.outputs.sha }}
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable

      - name: Build and checksum
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          # mkcert ships raw, directly-runnable binaries: the README tells people
          # to download mkcert-v*-<os>-<arch>, chmod +x it and run it as-is. So
          # unlike permits we do NOT wrap the binary in a tar/zip, we publish the
          # binary itself plus a .sha256 sidecar to keep that download flow
          # working.
          name="mkcert-${TAG}-${GOOS}-${GOARCH}"
          if [ "$GOOS" = windows ]; then
            name="${name}.exe"
          fi
          # -trimpath drops local filesystem paths; -s -w strips the symbol and
          # DWARF tables so release binaries are smaller; -X main.Version stamps
          # the release tag so `mkcert --version` reports it. CGO is off so every
          # target is a static, dependency-free binary.
          go build -trimpath -ldflags="-s -w -X main.Version=${TAG}" -o "$name" .
          sha256sum "$name" > "${name}.sha256"
          echo "ARTIFACT=$name" >> "$GITHUB_ENV"

      # Binds the binary's digest to this repo/commit/workflow run so consumers
      # can run `gh attestation verify <binary> --repo monetr/mkcert`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.ARTIFACT }}

      - name: Attach to the draft release
        env:
          GH_TOKEN: ${{ github.token }}
        # --clobber so re-running the job replaces assets instead of failing.
        run: gh release upload "$TAG" "$ARTIFACT" "${ARTIFACT}.sha256" --clobber

  publish-release:
    name: Publish release
    needs: [release-please, release-binaries]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # Flip the draft release to published.
      contents: write
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
      GH_TOKEN: ${{ github.token }}
      # gh needs a repo context; this job has no checkout to infer one from.
      GH_REPO: ${{ github.repository }}
    steps:
      # Runs only after every binary job succeeded, so an incomplete release is
      # never published -- it stays a draft to investigate. Publishing freezes
      # the release and its assets together (immutable). A SemVer-prerelease tag
      # (e.g. v1.5.0-rc.1) is published as a prerelease and never marked Latest;
      # a final vX.Y.Z is the inverse.
      - name: Publish the GitHub Release
        run: |
          set -euo pipefail
          case "$TAG" in
            *-*) gh release edit "$TAG" --draft=false --prerelease --latest=false ;;
            *)   gh release edit "$TAG" --draft=false --prerelease=false --latest ;;
          esac
